name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '~1.26.4'   # >=1.26.4 <1.27.0 (follow 1.26.x patches)
          cache: true
      # Build golangci-lint from source with Go 1.26. The prebuilt binaries
      # shipped by the action may be built with an older Go and fail to
      # analyze a go 1.26 module ("Go language version ... is lower than the
      # targeted Go version").
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m

  vulncheck:
    name: Vulncheck (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '~1.26.4'   # >=1.26.4 <1.27.0 (follow 1.26.x patches)
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...
